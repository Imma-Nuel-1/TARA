<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Tara</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="landing" aria-live="polite">
      <canvas id="bg-letters" aria-hidden="true"></canvas>
      <div id="glow-halo" aria-hidden="true"></div>
      <div id="rain-layer" aria-hidden="true"></div>

      <section id="countdown-screen" class="screen visible">
        <h1 id="countdown-number" class="gradient-text pulse">5</h1>
      </section>

      <section id="message-screen" class="screen">
        <h2 id="main-message" class="gradient-text">
          Happy Birthday Tara, Babe &#x1F495;
        </h2>
      </section>

      <audio id="bg-music" autoplay loop preload="auto">
        <source src="./music/Fireboy-DML-Need-Me-.mp3" type="audio/mpeg" />
      </audio>
    </main>

    <script src="script.js"></script>
  </body>
</html>
